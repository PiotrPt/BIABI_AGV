GA_PARAMS:
  population_size: 180      
  num_generations: 250         
  mutation_percent: 0.20        
  crossover_type: "single_point"
  parent_selection: "tournament"
  tournament_size: 5
  mutation_by_adaptation: false
  fitness_evaluations: 1          

NETWORK_ARCH: [16, 64, 32, 2]   

REWARD_WEIGHTS:
  checkpoint_reached: 15000       
  distance_improvement: 120.0    
  speed_bonus: 0.5                
  forward_bonus: 80.0             
  progress_penalty: -10.0         
  

  stuck_penalty: -200.0             
  idle_rotation_penalty: -0.2     
  sharp_rotation_penalty: -0.001   
  collision_penalty: -30.0        
  no_action_penalty: -50.0         
  timeout_penalty: -3000.0        

EPISODE_STEPS: 500         
CHECKPOINT_MODE: "ordered"       
MAP: "maps/learning_maze_simple.json"  
CHECKPOINT_RADIUS: 50            

ROBOT:
  max_speed: 1.0                  
  sensor_max_distance: 50        
  sensor_angles: [-60, 0, 60]     
  width: 30                       
  height: 20                     
  stuck_threshold: 0.05           

SIMULATION:
  dt: 0.016                       # ~60 FPS
  resolution: [1200, 800]


VERBOSE: false
SAVE_FREQUENCY: 10                
SEED: 42                          
